name: agent-task-gates

# Run on every PR opened by a coding agent. Validates the PR structure,
# scope, branch shape, and rule compliance via agent_completion_gate.py.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
    branches:
      - main
      - master
      - develop

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  agent-task-gates:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'agent/')
    steps:
      - name: Check out PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          # PyYAML is optional for rule check scripts (config file reading)
          pip install pyyaml || true

      - name: Run completion gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/coding-rails/agent_completion_gate.py --pr "${PR_NUMBER}"

      - name: Post failure summary as PR comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "## coding-rails completion gate — FAILED",
              "",
              "One or more required PR checks did not pass. See the workflow log:",
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Common fixes:",
              "- PR body missing one of: Summary / Task metadata / Tests / Negative-smoke / Changed files / Known risks / Not done",
              "- Files changed outside of `allowed_paths` declared in `.agent/tasks/<task_id>.json`",
              "- Branch name does not match `agent/<tool>/<YYYYMMDD>-<slug>`",
              "- Merge commits or conflict markers present in the PR range",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
